{{define "edit_post.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Post - makhor</title>
    {{template "styles"}}
</head>
<body>
    {{template "nav" .}}
    <main>
        <h1>Edit Post</h1>

        {{if .Error}}
        <p class="error">{{.Error}}</p>
        {{end}}

        <form method="POST" action="{{.Subpath}}/posts/{{.Post.ID}}/edit">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" value="{{.Post.Title}}" required maxlength="200">

            {{if .Post.URL}}
            <p class="muted">URL: {{.Post.URL}} <span class="muted">(cannot be changed)</span></p>
            {{end}}

            <label for="body">Text</label>
            <textarea id="body" name="body">{{.Post.Body}}</textarea>

            <button type="submit">Save Changes</button>
        </form>

        <p style="margin-top: 1rem;">
            <a href="{{.Subpath}}/posts/{{.Post.ID}}">← Back to post</a>
        </p>
    </main>
    {{template "footer"}}
</body>
</html>
{{end}}
